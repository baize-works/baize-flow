name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      frontend_image_name:
        description: Frontend image name
        required: false
        default: ""
        type: string

      backend_image_name:
        description: Backend image name
        required: false
        default: ""
        type: string

      image_tag:
        description: Image tag used for manual publishing
        required: false
        default: "dev"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image
        env:
          FRONTEND_IMAGE_NAME: ${{ inputs.frontend_image_name }}
          BACKEND_IMAGE_NAME: ${{ inputs.backend_image_name }}
        run: |
          if [ -n "${FRONTEND_IMAGE_NAME}" ]; then
            echo "frontend=${FRONTEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "frontend=ghcr.io/${GITHUB_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          fi

          if [ -n "${BACKEND_IMAGE_NAME}" ]; then
            echo "backend=${BACKEND_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "backend=ghcr.io/${GITHUB_REPOSITORY}-api" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Backend metadata
      # =========================
      - name: Extract backend Docker metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.backend }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      # =========================
      # Frontend metadata
      # =========================
      - name: Extract frontend Docker metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.frontend }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      # =========================
      # Backend image
      # =========================
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=yak-ops-backend
          cache-to: type=gha,mode=max,scope=yak-ops-backend

      # =========================
      # Frontend image
      # =========================
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=yak-ops-frontend
          cache-to: type=gha,mode=max,scope=yak-ops-frontend
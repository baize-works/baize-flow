name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: yarn
          cache-dependency-path: yak-ops-ui/yarn.lock
      - name: Enable Corepack and set Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install frontend dependencies
        working-directory: yak-ops-ui
        run: yarn install --frozen-lockfile
      - name: Build frontend
        working-directory: yak-ops-ui
        run: yarn build
      - name: Test and build backend distribution
        run: ./mvnw --batch-mode --no-transfer-progress -T 1C clean verify
      - name: Package release payload
        run: |
          mkdir -p release
          cp yak-ops-dist/target/yak-ops-*.tar.gz release/
          (cd yak-ops-ui && zip -qr ../release/yak-ops-ui-${RELEASE_VERSION}.zip dist)
          (cd release && sha256sum * > checksums.sha256)
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release/sbom.cdx.json
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yak-ops-release-${{ env.RELEASE_VERSION }}
          path: release/*
          if-no-files-found: error
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Yak Ops ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: release/*

name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Show Maven version
        run: ./mvnw --version

      - name: Build and verify
        run: ./mvnw --batch-mode --no-transfer-progress -T 1C clean verify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: yak-ops-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: yarn
          cache-dependency-path: yak-ops-ui/yarn.lock

      - name: Enable Corepack and set Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Show versions
        run: |
          node --version
          yarn --version

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

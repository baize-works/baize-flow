name: Bug report
description: Report a reproducible problem in Yak Ops
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, reproducible sequence of actions.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Yak Ops version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, JDK, Node.js, database, SeaTunnel version, deployment method.
      placeholder: |
        - OS:
        - Browser:
        - JDK:
        - Node.js:
        - SeaTunnel:
        - Deployment:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context

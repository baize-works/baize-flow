server:
  port: ${SERVER_PORT:9527}
  tomcat:
    accept-count: 1000
    max-connections: 10000
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  banner:
    charset: UTF-8
  jackson:
    time-zone: GMT+8
    date-format: "yyyy-MM-dd HH:mm:ss"
  servlet:
    multipart:
      max-file-size: ${YAK_OPS_MAX_FILE_SIZE:200MB}
      max-request-size: ${YAK_OPS_MAX_REQUEST_SIZE:200MB}
  messages:
    basename: i18n/messages
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      pool-name: yak-ops
      connection-timeout: 15000
      validation-timeout: 5000
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration/{vendor}
    table: t_baize_flow_schema_history
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1.0.0}
    baseline-description: Yak Ops legacy schema baseline
  application:
    name: yak-ops
  main:
    allow-bean-definition-overriding: true
  ai:
    deepseek:
      api-key: sk-****
      base-url: "https://api.deepseek.com"
      chat:
        options:
          model: deepseek-chat
      embedding:
        enabled: false

  quartz:
    auto-startup: true
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: yak-ops
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.scheduler.makeSchedulerThreadDaemon: true

      org.quartz.jobStore.class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 5000
      org.quartz.jobStore.acquireTriggersWithinLock: true
      org.quartz.jobStore.useProperties: false
      org.quartz.jobStore.misfireThreshold: 60000

      org.quartz.scheduler.batchTriggerAcquisitionMaxCount: 25

      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: 10
      org.quartz.threadPool.threadPriority: 5


logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    enabled-by-default: false

# Mybatis-plus configuration, you don't need to change it
mybatis-plus:
  mapper-locations: classpath:org/apache/seatunnel/web/dao/mapper/*Mapper.xml
  type-aliases-package: io.baize.flow.dao.entity
  configuration:
    cache-enabled: false
    call-setters-on-nulls: true
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL
  global-config:
    db-config:
      id-type: auto
    banner: false

seatunnel:
  metrics:
    interval-ms: 2000
    log-every-times: 10
    max-monitor-ms: 1800000
    max-empty-times: 30
    max-error-times: 30
    no-progress-warn-ms: 300000

  streaming:
    metrics:
      interval-ms: 5000
      max-empty-times: 30
      max-error-times: 30
      log-every-times: 10
      retention-days: 7
      retention-cron: "0 20 3 * * ?"

  client:
    health-check:
      enabled: true
      initial-delay-ms: 15000
      fixed-delay-ms: 30000
      unhealthy-threshold: 3

  job:
    log-dir: logs

    # Maximum file size allowed for a single log query: 50MB
    max-log-query-bytes: 52428800

    recovery:
      enabled: true
      initial-delay-ms: 60000
      fixed-delay-ms: 60000
  web:
    database:
      type: ${YAK_OPS_DATABASE_TYPE:mysql}
